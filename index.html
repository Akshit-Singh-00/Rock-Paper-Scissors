<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock_Paper_Scissors Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Let's Play</h1>
    <div class="choices">
        <div class="choice">
            <img src="Images/rock.png" alt="" id="rock">
        </div>
        <div class="choice">
            <img src="Images/paper.png" alt=""id="paper">
        </div>
        <div class="choice">
            <img src="Images/scissors.png" alt="" id="scissors">
        </div>
    </div>
    <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>You</p>
        </div>
        <div class="score">
            <p id="computer-score">0</p>
            <p>Comp</p>
        </div>
    </div>
    <div class="msg-container">
        <p id="msg">Play your move</p>
    </div>
</body>
</html>
